<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Adri</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ESQUINAS -->
<div class="corner tl" onclick="go('home')"></div>
<div class="corner tr" onclick="go('music')"></div>
<div class="corner bl" onclick="go('about')"></div>
<div class="corner br" onclick="go('home')"></div>

<!-- SECCIONES -->
<section id="home" class="active">
  <h1>ADRI</h1>
</section>

<section id="music">
  <h1>BEATS PRIVADOS</h1>

  <div class="music-container">
    <label for="subirBeat">Subir beat</label>
    <input type="file" id="subirBeat" accept="audio/*">

    <div id="listaBeat"></div>
  </div>
</section>

<section id="about">
  <h1>Sobre mí</h1>
</section>

<!-- LOGIN -->
<div id="login-overlay">
  <div id="login-box">
    <h2>Acceso privado</h2>
    <input type="password" id="clave-input" placeholder="Clave">
    <button onclick="comprobarClave()">Entrar</button>
    <p id="error-msg"></p>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
