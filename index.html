<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Adri</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ESQUINAS -->
<div class="corner tl" onclick="go('home')">
  <i class="fa-solid fa-house"></i>
</div>

<div class="corner tr" onclick="go('music')">
  <i class="fa-solid fa-music"></i>
</div>

<div class="corner bl" onclick="go('about')">
  <i class="fa-solid fa-user"></i>
</div>

<div class="corner br" onclick="openLogin()">
  <i class="fa-solid fa-lock"></i>
</div>

<!-- SECCIONES -->
<section id="home" class="active">
  <h1>ADRI</h1>
</section>

<section id="music">
  <h1>BEATS PRIVADOS</h1>

  <div class="music-container">
    <label for="subirBeat">Subir beat</label>
    <input type="file" id="subirBeat" accept="audio/*">

    <div id="listaBeat"></div>
  </div>
</section>

<section id="about">
  <h1>Sobre mí</h1>
</section>

<!-- LOGIN ORIGINAL + X FUNCIONAL -->
<div id="login-overlay">
  <div id="login-box">
    <span class="close-x" onclick="cerrarLogin()">✕</span>

    <h2>Acceso privado</h2>

    <input type="password" id="clave-input" placeholder="Clave">
    <button onclick="comprobarClave()">Entrar</button>

    <p id="error-msg"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
